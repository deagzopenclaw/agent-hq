<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent HQ — Hermes Control Center</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="top-hud">
        <div>
          <p class="eyebrow">Live Hermes workspace</p>
          <h1>Agent HQ</h1>
          <p class="truth">Loading real backend state…</p>
        </div>
        <div class="hud-actions">
          <button id="syncBtn">Refresh</button>
          <a href="/api/hq/state" target="_blank">Raw state</a>
        </div>
      </header>

      <main class="hq-layout">
        <aside class="control-center" aria-label="Agent HQ control center">
          <div class="control-title">
            <span class="tiny-led"></span>
            <div>
              <b>Control Center</b>
              <small>Open one station at a time</small>
            </div>
          </div>

          <details class="nav-section" open>
            <summary>Chat</summary>
            <div class="chat-panel compact-panel">
              <div id="chatHistory" class="chat-history"></div>
              <form id="chatForm">
                <input id="chatInput" autocomplete="off" placeholder="Message Hermes…" />
                <button>Send</button>
              </form>
            </div>
          </details>

          <details class="nav-section" open>
            <summary>Ecosystem</summary>
            <div class="compact-panel selected-card">
              <p class="panel-kicker">Selected</p>
              <div id="selected">Click a building or agent.</div>
            </div>
          </details>

          <details class="nav-section">
            <summary>Agents</summary>
            <div class="compact-panel agent-roster-panel">
              <p class="panel-kicker">Agents at work</p>
              <div id="agentRoster"></div>
            </div>
          </details>

          <details class="nav-section">
            <summary>Telemetry</summary>
            <div class="compact-panel metrics">
              <p class="panel-kicker">Live telemetry</p>
              <div id="metrics"></div>
            </div>
          </details>

          <details class="nav-section">
            <summary>Activity</summary>
            <div class="compact-panel log-panel">
              <p class="panel-kicker">Activity stream</p>
              <pre id="logs">No logs loaded yet.</pre>
            </div>
          </details>

          <details class="nav-section">
            <summary>Alerts</summary>
            <div class="compact-panel alerts">
              <p class="panel-kicker">Alerts</p>
              <div id="alerts"></div>
            </div>
          </details>
        </aside>

        <section class="city-shell">
          <div class="world" id="world">
            <canvas id="cityCanvas" width="1280" height="720" aria-label="Textured pixel-art Hermes agent city"></canvas>
            <svg class="streams" viewBox="0 0 100 100" preserveAspectRatio="none" id="streams"></svg>
            <div id="buildings" aria-label="Clickable city buildings"></div>
            <div id="agents" aria-label="Clickable agents"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
